  <p>SQL Saturday - Arequipa 2026, es un evento gratuito que reúne lo mejor de la suite de Data Platform, organizado por la comunidad Cloud Experts Community, este evento está dirigido a cualquier persona que desea aprender y compartir sus conocimientos.</p>
