precondetail: |
  <h2>Precons Available</h2>
  <p> We have two preconference sessions available on Friday, the 24th. Please consider registering for these and get a day of training at a very low cost.</p>
  <p><b>Performance Tuning: from Zero to Hero</b> by Pinal Dave: <a href="https://www.eventbrite.com/e/from-zero-to-hero-sql-server-performance-tuning-workshop-tickets-1984623163306?aff=oddtdtcreator">register today</a></p>
  <p>This full day, hands on workshop is built around the story of an organization struggling with real performance challenges. You step in as the new team member who must diagnose issues, understand root causes, and apply practical fixes.</p>
  <p><b>Intro and Beyond Data Builder Tool</b> by John Miner: <a href="https://www.eventbrite.com/e/workshop-intro-to-data-build-tool-tickets-1984938805400?aff=oddtdtcreator">register today</a></p>
  <p>Get ready to dive into the basics of Data Build Tool and boost your data game in this chill workshop. We are happy to present a full day workshop for Data Build Tool conducted by Microsoft MVP John Miner.</p>

